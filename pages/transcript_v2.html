<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrynScribe Workspace</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5' },
                        slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 600: '#475569', 700: '#334155', 900: '#0f172a' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        .flip-card { perspective: 1000px; width: 100%; height: 280px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 2rem; border-radius: 24px; border: 1px solid #e2e8f0; }
        .flip-card-front { background: #fff; color: #0f172a; }
        .flip-card-back { background: #0f172a; color: #fff; transform: rotateY(180deg); font-weight: bold; }
        
        .markdown-html h3 { font-size: 1.5rem; font-weight: 900; margin-top: 1.5rem; margin-bottom: 0.75rem; color: #0f172a; }
        .markdown-html h4 { font-size: 1.25rem; font-weight: 700; margin-top: 1.25rem; margin-bottom: 0.5rem; color: #334155; }
        .markdown-html p { margin-bottom: 1rem; line-height: 1.7; }
        .markdown-html ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-html li { margin-bottom: 0.5rem; }
        .markdown-html strong { font-weight: 800; color: #0f172a; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { getLecture, getFullTranscript } from '../lib/db.js';
        import { askLectureBot } from '../lib/ai_service.js';
        window.getLectureData = async (id) => {
            const lecture = await getLecture(id);
            const transcript = await getFullTranscript(id);
            return { ...lecture, fullTranscript: transcript || "" };
        };
        window.askAI = askLectureBot;
    </script>

    <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef } = React;

        const formatMarkdown = (text) => {
            if (!text) return "";
            return text
                .replace(/^# (.*)/gm, '<h3>$1</h3>')
                .replace(/^## (.*)/gm, '<h4>$1</h4>')
                .replace(/^\* (.*)/gm, '<ul><li>$1</li></ul>')
                .replace(/\n\n/g, '<p></p>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/<\/ul>\n<ul>/g, '\n');
        };

        const Flashcard = ({ card }) => {
            const [flipped, setFlipped] = useState(false);
            return (
                <div className={`flip-card ${flipped ? 'flipped' : ''}`} onClick={() => setFlipped(!flipped)}>
                    <div className="flip-card-inner">
                        <div className="flip-card-front shadow-sm">{card.question}</div>
                        <div className="flip-card-back shadow-lg">{card.answer}</div>
                    </div>
                </div>
            );
        };

        const MCQ = ({ mcq, index }) => {
            const [selected, setSelected] = useState(null);
            return (
                <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm mb-6">
                    <h3 className="font-bold text-lg mb-4">{index + 1}. {mcq.question}</h3>
                    <div className="space-y-3">
                        {mcq.options.map((opt, i) => {
                            let style = "border-slate-200 hover:border-indigo-300 hover:bg-slate-50";
                            if (selected !== null) {
                                if (i === mcq.answerIndex) style = "border-green-500 bg-green-50 text-green-700";
                                else if (i === selected) style = "border-red-500 bg-red-50 text-red-700";
                                else style = "border-slate-100 opacity-50";
                            }
                            return (
                                <button 
                                    key={i} 
                                    disabled={selected !== null}
                                    onClick={() => setSelected(i)}
                                    className={`w-full text-left p-4 rounded-xl border-2 transition-all ${style}`}
                                >
                                    {opt}
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const LearningWorkspace = ({ data }) => {
            const [activeTab, setActiveTab] = useState('summary_sheet');
            const [focusMode, setFocusMode] = useState(false);
            const [revisionMode, setRevisionMode] = useState(false);
            const [chatQuery, setChatQuery] = useState('');
            const [chatHistory, setChatHistory] = useState([{role: 'bot', content: "Hello! I've gone through the lecture. What would you like to explore?"}]);
            const [isThinking, setIsThinking] = useState(false);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [chatHistory]);

            const handleAskAI = async () => {
                if (!chatQuery.trim()) return;
                const newHistory = [...chatHistory, { role: 'user', content: chatQuery }];
                setChatHistory(newHistory);
                setChatQuery('');
                setIsThinking(true);
                try {
                    const response = await window.askAI(chatQuery, data.fullTranscript, newHistory.slice(-5));
                    setChatHistory([...newHistory, { role: 'bot', content: response }]);
                } catch (e) {
                    setChatHistory([...newHistory, { role: 'bot', content: "Error communicating with AI engine." }]);
                }
                setIsThinking(false);
            };

            const navItems = [
                { id: 'summary_sheet', label: 'Summary Sheet', icon: '📝' },
                { id: 'quiz', label: '15-MCQ Quiz', icon: '🧐' },
                { id: 'flashcards', label: 'Flashcards', icon: '🃏' },
                { id: 'analysis', label: 'Critical Analysis', icon: '⚖️' },
                { id: 'history', label: 'Historical Context', icon: '🏛️' },
                { id: 'transcript', label: 'Full Transcript', icon: '📜' }
            ];

            if (!data) return <div className="p-20 text-slate-400 font-bold">Initializing Workspace...</div>;

            return (
                <div className={`flex h-screen bg-slate-50 font-sans text-slate-900 ${focusMode ? 'px-0' : ''}`}>
                    {/* LEFT SIDEBAR */}
                    {!focusMode && (
                        <aside className="w-64 bg-white border-r border-slate-200 flex flex-col p-6 transition-all duration-300 overflow-y-auto">
                            <div className="flex items-center gap-3 mb-10">
                                <div className="w-10 h-10 bg-indigo-600 rounded-2xl flex items-center justify-center text-white text-xl font-black">P</div>
                                <span className="text-xl font-black tracking-tighter">PrynScribe</span>
                            </div>
                            <nav className="flex-1 space-y-1">
                                {navItems.map(item => (
                                    <button 
                                        key={item.id}
                                        onClick={() => setActiveTab(item.id)}
                                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-bold transition-all ${activeTab === item.id ? 'bg-indigo-50 text-indigo-600 shadow-sm' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'}`}
                                    >
                                        <span>{item.icon}</span> {item.label}
                                    </button>
                                ))}
                            </nav>
                            <div className="pt-6 mt-6 border-t border-slate-100 space-y-3">
                                <button 
                                    onClick={() => setRevisionMode(!revisionMode)}
                                    className={`w-full flex items-center justify-between px-4 py-3 rounded-2xl text-xs font-bold transition-colors ${revisionMode ? 'bg-amber-50 text-amber-600' : 'text-slate-400 hover:bg-slate-50'}`}
                                >
                                    REVISION MODE
                                    <div className={`w-8 h-4 rounded-full relative transition-colors ${revisionMode ? 'bg-amber-400' : 'bg-slate-200'}`}>
                                        <div className={`absolute top-0.5 w-3 h-3 bg-white rounded-full transition-all ${revisionMode ? 'left-4.5' : 'left-0.5'}`} />
                                    </div>
                                </button>
                                <button onClick={() => setFocusMode(true)} className="w-full bg-slate-900 text-white rounded-2xl py-3 text-xs font-bold hover:scale-[1.02] transition-transform">
                                    FOCUS MODE
                                </button>
                            </div>
                        </aside>
                    )}

                    {/* MAIN CONTENT */}
                    <main className="flex-1 overflow-y-auto px-16 py-12 relative">
                        {focusMode && (
                            <button onClick={() => setFocusMode(false)} className="fixed top-8 left-8 text-slate-400 hover:text-indigo-600 font-black z-50">📁 EXIT FOCUS</button>
                        )}
                        
                        <div className="max-w-3xl mx-auto space-y-12 pb-32">
                            <header className="space-y-4">
                                <div className="text-[10px] font-black text-indigo-500 tracking-[0.3em] uppercase">Intelligence Report • Session Artifact</div>
                                <h1 className="text-5xl font-black text-slate-900 leading-tight tracking-tight">{data.title || "Subject Analysis"}</h1>
                                {data.tags && (
                                    <div className="flex gap-2 mt-4">
                                        {data.tags.map(tag => (
                                            <span key={tag} className="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-[10px] font-bold border border-indigo-100 uppercase tracking-wider">
                                                {tag}
                                            </span>
                                        ))}
                                    </div>
                                )}
                            </header>

                            <section className="bg-white rounded-3xl p-10 border border-slate-100 shadow-sm relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-1.5 h-full bg-indigo-500" />
                                <h2 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Execution Summary</h2>
                                <p className="text-xl text-slate-700 font-medium leading-relaxed italic">{data.summary || "Pending Synthesis..."}</p>
                            </section>

                            {/* Section Renders */}
                            {activeTab === 'summary_sheet' && (
                                <article className="bg-white rounded-3xl p-12 border border-slate-100 shadow-sm">
                                    <h3 className="text-2xl font-black text-slate-900 mb-8 border-b border-slate-50 pb-6">Summary Sheet</h3>
                                    <div className="markdown-html text-slate-600 text-lg" dangerouslySetInnerHTML={{__html: formatMarkdown(data.summary_sheet || data.synthesis)}} />
                                </article>
                            )}

                            {activeTab === 'analysis' && (
                                <article className="bg-white rounded-3xl p-12 border border-slate-100 shadow-sm">
                                    <h3 className="text-2xl font-black text-slate-900 mb-8 border-b border-slate-50 pb-6">Critical Analysis</h3>
                                    <div className="markdown-html text-slate-600 text-lg" dangerouslySetInnerHTML={{__html: formatMarkdown(data.analysis)}} />
                                </article>
                            )}

                            {activeTab === 'history' && (
                                <article className="bg-white rounded-3xl p-12 border border-slate-100 shadow-sm">
                                    <h3 className="text-2xl font-black text-slate-900 mb-8 border-b border-slate-50 pb-6">Historical Context</h3>
                                    <div className="markdown-html text-slate-600 text-lg" dangerouslySetInnerHTML={{__html: formatMarkdown(data.history)}} />
                                </article>
                            )}
                            
                            {activeTab === 'transcript' && (
                                <article className="bg-slate-900 rounded-3xl p-12 shadow-xl border border-slate-800 text-white">
                                    <h3 className="text-2xl font-black text-white mb-8 border-b border-slate-800 pb-6 text-indigo-400">Full Word-to-Word Transcript</h3>
                                    <div className="text-slate-300 text-lg leading-10 font-mono text-sm max-h-[60vh] overflow-y-auto pr-4">
                                        {data.fullTranscript}
                                    </div>
                                </article>
                            )}

                            {activeTab === 'quiz' && data.mcqs && (
                                <div>
                                    <h3 className="text-2xl font-black text-slate-900 mb-8">Neural Evaluation (15 MCQ)</h3>
                                    {data.mcqs.map((mcq, idx) => <MCQ key={idx} mcq={mcq} index={idx} />)}
                                </div>
                            )}

                            {activeTab === 'flashcards' && data.flashcards && (
                                <div>
                                    <h3 className="text-2xl font-black text-slate-900 mb-8">Active Recall Deck</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        {data.flashcards.map((card, idx) => <Flashcard key={idx} card={card} />)}
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>

                    {/* RIGHT PANEL - AI CONSULTANT */}
                    {!focusMode && !revisionMode && (
                        <aside className="w-80 bg-white border-l border-slate-200 flex flex-col h-full">
                            {/* Chat Interface */}
                            <div className="flex-1 flex flex-col overflow-hidden">
                                <div className="p-6 border-b border-slate-100 bg-indigo-50">
                                    <h4 className="text-[10px] font-black text-indigo-600 uppercase tracking-widest">Neural Consultant</h4>
                                </div>
                                <div className="flex-1 overflow-y-auto p-6 space-y-4">
                                    {chatHistory.map((m, i) => (
                                        <div key={i} className={`p-4 rounded-2xl text-sm leading-relaxed ${m.role === 'user' ? 'bg-slate-900 text-white rounded-br-sm ml-8' : 'bg-slate-50 border border-slate-100 text-slate-700 rounded-bl-sm mr-8'}`}>
                                            {m.content}
                                        </div>
                                    ))}
                                    {isThinking && <div className="p-4 bg-slate-50 border border-slate-100 text-slate-400 w-24 rounded-2xl rounded-bl-sm italic text-xs">Analyzing...</div>}
                                    <div ref={chatEndRef} />
                                </div>
                                <div className="p-4 border-t border-slate-100">
                                    <div className="relative">
                                        <input 
                                            className="w-full bg-slate-50 border border-slate-200 rounded-2xl pl-4 pr-12 py-4 text-xs font-bold outline-none focus:border-indigo-400 transition-all font-mono" 
                                            placeholder="Ask Intelligence..."
                                            value={chatQuery}
                                            onChange={e => setChatQuery(e.target.value)}
                                            onKeyDown={e => e.key === 'Enter' && handleAskAI()}
                                        />
                                        <button onClick={handleAskAI} className="absolute right-3 top-2.5 p-2 bg-indigo-600 text-white rounded-xl hover:bg-slate-900 transition-colors">↑</button>
                                    </div>
                                </div>
                            </div>
                            
                            {/* Glossary Summary */}
                            <div className="p-6 border-t border-slate-100 bg-slate-50 max-h-64 overflow-y-auto">
                                <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Smart Glossary</h4>
                                <div className="space-y-3">
                                    {data.glossary ? data.glossary.slice(0, 5).map(g => (
                                        <div key={g.term} className="text-xs border-l-2 border-indigo-500 pl-3">
                                            <strong className="block text-slate-900 mb-1">{g.term}</strong>
                                            <span className="text-slate-500 leading-relaxed">{g.definition}</span>
                                        </div>
                                    )) : <span className="text-xs text-slate-400">No terms extracted.</span>}
                                </div>
                            </div>
                        </aside>
                    )}
                </div>
            );
        };

        const Main = () => {
            const [lectureData, setLectureData] = useState(null);

            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const id = parseInt(urlParams.get('id'));
                if (id && window.getLectureData) {
                    window.getLectureData(id).then(setLectureData);
                }
            }, []);

            return <LearningWorkspace data={lectureData} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Main />);
    </script>
</body>
</html>
