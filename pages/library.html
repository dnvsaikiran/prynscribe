<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrynScribe - Intellectual Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #6366f1;
            --bg: #000;
            --surface: #0a0a0a;
            --surface-light: #111;
            --text: #fff;
            --text-muted: #666;
            --border: #222;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            line-height: 1.6;
        }

        /* Navigation Header */
        nav {
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-sizing: border-box;
        }

        .nav-brand {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: var(--text);
            text-decoration: none;
        }

        .page-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 120px 40px 60px;
        }

        .header-section {
            margin-bottom: 64px;
        }

        .archive-title {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: -4px;
            margin: 0;
            background: linear-gradient(180deg, #fff 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .archive-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 800;
            margin-top: 8px;
        }

        /* Filters */
        .controls-row {
            display: flex;
            gap: 16px;
            margin-bottom: 48px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 300px;
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 24px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--text-muted);
        }

        .filter-select {
            background: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0 24px;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            outline: none;
        }

        /* Grid */
        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 32px;
        }

        .archive-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .archive-card:hover {
            border-color: var(--text-muted);
            transform: translateY(-8px);
            background: #0d0d0d;
        }

        .card-status {
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1.2;
            margin-bottom: 12px;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            font-weight: 600;
        }

        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 32px;
        }

        .tag {
            font-size: 10px;
            font-weight: 800;
            background: var(--surface-light);
            padding: 6px 12px;
            border-radius: 6px;
            color: #888;
            text-transform: uppercase;
        }

        .quote-box {
            background: rgba(255,255,255,0.02);
            border-left: 2px solid var(--border);
            padding: 16px 24px;
            margin-bottom: 32px;
            font-style: italic;
            font-size: 14px;
            color: #aaa;
        }

        .card-footer {
            margin-top: auto;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .author-tag {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .btn-open {
            background: var(--text);
            color: var(--bg);
            border: none;
            padding: 10px 24px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-open:hover {
            opacity: 0.9;
        }

        #empty-state {
            text-align: center;
            padding: 120px 0;
            display: none;
        }

        .empty-text {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-muted);
            letter-spacing: -1px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">PRYNSCRIBE</a>
        <div style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;">
            Secure Archive Access
        </div>
    </nav>

    <div class="page-container">
        <div class="header-section">
            <h1 class="archive-title">Intellectual Archive</h1>
            <div class="archive-subtitle" id="user-context-subtitle">Loading your personalized vaults...</div>
        </div>

        <div class="controls-row">
            <input type="text" id="search-archive" class="search-input" placeholder="Search by topic, keyword or date...">
            <select id="filter-subject" class="filter-select">
                <option value="">All Subjects</option>
                <option value="Polity">Polity</option>
                <option value="Economy">Economy</option>
                <option value="History">History</option>
                <option value="Geography">Geography</option>
                <option value="Philosophy">Philosophy</option>
            </select>
        </div>

        <div id="empty-state">
            <div class="empty-text">Your archive is currently silent.</div>
            <div style="color: var(--text-muted); font-size: 14px; margin-top: 12px;">Start a recording from the extension to begin your collection.</div>
        </div>

        <div id="archive-grid" class="archive-grid">
            <!-- Dynamic Cards -->
        </div>
    </div>

    <script type="module" src="library.js"></script>
</body>
</html>
