<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prysm - Processing</title>
    <link rel="stylesheet" href="../css/theme.css">
    <style>
        .loader-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }
        .loading-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .brand-gradient {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .progress-box {
            width: 100%;
            margin-top: 2.5rem;
            text-align: left;
        }
        .step {
            margin-bottom: 1.25rem;
            opacity: 0.3;
            transition: all 0.4s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1rem;
        }
        .step.active {
            opacity: 1;
            transform: translateX(10px);
        }
        .step.done {
            opacity: 1;
            color: var(--success);
        }
        .check-icon {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .step.active .check-icon {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
        .step.done .check-icon {
            border-color: var(--success);
            background: var(--success);
            color: white;
        }
        .step.done .check-icon::after {
            content: "✓";
        }
        #current-status {
            margin-top: 2.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-family: monospace;
            background: rgba(0,0,0,0.2);
            padding: 0.75rem;
            border-radius: 8px;
        }
    </style>
</head>
<body class="loader-page">
    <div class="loading-card">
        <div class="brand-gradient">Prysm</div>
        <p style="color: var(--text-secondary); font-size: 1.1rem; margin-top: 0;" id="lecture-title">Assembling Master Notes...</p>
        
        <div class="progress-box">
            <div id="step-capture" class="step">
                <div class="check-icon"></div>
                <span>Session Audio Captured</span>
            </div>
            <div id="step-transcribe" class="step">
                <div class="check-icon"></div>
                <span>Transcribing Neural Pipeline</span>
            </div>
            <div id="step-extract" class="step">
                <div class="check-icon"></div>
                <span>Knowledge Extraction</span>
            </div>
            <div id="step-notes" class="step">
                <div class="check-icon"></div>
                <span>Building Structured Synthesis</span>
            </div>
            <div id="step-tags" class="step">
                <div class="check-icon"></div>
                <span>Generating Smart Meta-Tags</span>
            </div>
            <div id="step-finalize" class="step">
                <div class="check-icon"></div>
                <span>Finalising Educational Suite</span>
            </div>
        </div>

        <div id="current-status">Initializing worker environment...</div>
    </div>

    <script src="loading.js"></script>
</body>
</html>
