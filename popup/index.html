<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PrynScribe Elite</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/modes.css">
  <style>
    /* Obsidian Elite Edition v28 */
    body { min-height: 480px; width: 340px; padding: 0; margin: 0; overflow: hidden; background: #010101; font-family: 'Outfit', 'Inter', sans-serif; }
    .popup-container { padding: 20px; display: flex; flex-direction: column; gap: 18px; position: relative; }
    
    /* Background Glow */
    .glow-bg { position: absolute; top: -50px; left: 50%; transform: translateX(-50%); width: 200px; height: 100px; background: radial-gradient(circle, rgba(99, 102, 241, 0.2) 0%, transparent 70%); pointer-events: none; }

    .brand-mini { display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 10; padding: 0 4px; }
    .brand-logo { display:flex; align-items:center; gap:8px; font-weight:950; font-size:14px; letter-spacing:-0.8px; color:#fff; }
    #status-ticker { font-size: 8px; font-weight: 900; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.15em; }

    /* VERTICAL ACTION STACK */
    .action-shell { 
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px;
      background: linear-gradient(180deg, #0a0a0a 0%, #030303 100%); 
      border: 1px solid rgba(255,255,255,0.08); 
      border-radius: 36px; padding: 35px 20px; 
      box-shadow: 0 15px 40px rgba(0,0,0,0.8);
      position: relative; overflow: hidden;
    }
    
    .timer-digits { 
      font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: 800; color: #fff; 
      line-height: 1; letter-spacing: -4px; transition: all 0.3s ease;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.05));
    }
    .timer-digits.active { 
       color: #fff; 
       text-shadow: 0 0 25px rgba(99, 102, 241, 0.6), 0 0 10px rgba(99, 102, 241, 0.4);
       transform: scale(1.02);
    }
    
    /* CINEMATIC WAVEFORM (14 BARS) */
    .wave-pro { display: flex; align-items: center; justify-content: center; gap: 4px; height: 40px; margin: 5px 0; }
    .wave-bar-pro { 
      width: 4.5px; height: 20%; 
      background: linear-gradient(to top, #4f46e5, #c084fc); 
      border-radius: 99px; transition: height 0.04s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
    }

    /* PREMIUM CONTROLS */
    .speed-card { background: #080808; border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 18px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
    .compact-label { font-size: 9px; font-weight: 950; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 0.1em; }
    
    #telemetry-panels { flex: 1; }
    #popup-verbatim { 
      width: 100%; height: 95px; background: #010101; border: 1px solid rgba(255,255,255,0.06); 
      border-radius: 18px; color: #6e6e73; font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 14px; 
      overflow-y: auto; line-height: 1.6; scroll-behavior: smooth;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }

    .btn-action { 
      background: #fff; color: #000; border-radius: 99px; padding: 14px 40px; 
      font-weight: 950; font-size: 11px; border: none; cursor: pointer; 
      display: flex; align-items: center; gap: 10px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 20px rgba(255,255,255,0.1);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .btn-action:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,255,255,0.2); }
    .btn-action:active { transform: translateY(1px); }
    
    /* CUSTOM SLIDER */
    input[type=range] { -webkit-appearance: none; background: transparent; }
    input[type=range]::-webkit-slider-runnable-track { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; background: #fff; border-radius: 50%; cursor: pointer; margin-top: -6px; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

  </style>
</head>
<body>
  <div class="glow-bg"></div>
  <div class="popup-container">
    
    <div class="brand-mini">
       <div style="display: flex; align-items: center; gap: 10px;">
          <div id="region-flag" style="font-size: 16px;">🌐</div>
          <div class="brand-logo">PRYNSCRIBE</div>
       </div>
       <div id="status-ticker">SYSTEM ONLINE</div>
    </div>

    <!-- 0. MODE SELECTOR (New Elite System) -->
    <div id="mode-trigger-bar" 
         style="display:flex; align-items:center; justify-content:space-between; background:#080808; border:1px solid rgba(255,255,255,0.06); border-radius:14px; padding: 10px 14px; cursor:pointer;"
         onclick="document.getElementById('mode-sheet').style.display = 'block'">
        <div style="display:flex; align-items:center; gap:8px;">
            <span id="active-mode-emoji" style="font-size:16px;">✨</span>
            <div>
                <div style="font-size:9px; color:rgba(255,255,255,0.4); font-weight:800; letter-spacing:0.1em;">SYNTHESIS MODE</div>
                <div id="active-mode-label" style="font-size:12px; font-weight:800; color:#fff;">Auto Mode</div>
            </div>
        </div>
        <div style="font-size:10px; color:rgba(255,255,255,0.3); font-weight:800;">CHANGE ›</div>
    </div>

    <!-- Mode Sheet Overlay -->
    <div id="mode-sheet" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:500; overflow-y:auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; position:sticky; top:0; background:#010101; border-bottom:1px solid rgba(255,255,255,0.06);">
            <div style="font-size:13px; font-weight:900;">Choose Mode</div>
            <button onclick="document.getElementById('mode-sheet').style.display='none'" 
                    style="background:rgba(255,255,255,0.06); border:none; color:#fff; border-radius:99px; padding:6px 14px; font-size:10px; font-weight:800; cursor:pointer;">CLOSE ✕</button>
        </div>
        <div id="mode-selector-root" style="padding:4px;"></div>
    </div>

    <!-- Language Indicator Bar -->
    <div id="lang-indicator-bar" style="display:flex; align-items:center; justify-content:space-between; background:#080808; border:1px solid rgba(255,255,255,0.04); border-radius:10px; padding: 8px 12px;">
        <div style="display:flex; align-items:center; gap:8px; font-size:10px; color:rgba(255,255,255,0.4);">
            <span id="source-lang-flag">🌐</span>
            <span id="source-lang-label">Detecting language...</span>
            <span style="color:rgba(255,255,255,0.2);">→</span>
            <span id="output-lang-label" style="color:hsl(252,80%,75%); font-weight:800;">English</span>
        </div>
        <button id="lang-change-btn" style="font-size:8px; font-weight:900; letter-spacing:0.1em; background:none; border:1px solid rgba(255,255,255,0.1); border-radius:6px; padding:3px 8px; color:rgba(255,255,255,0.3); cursor:pointer; display:none;">CHANGE</button>
    </div>

    <!-- 1. RECORDING CORE -->
    <div class="action-shell">
      <div id="status-label" class="compact-label" style="opacity: 0.3; margin-top: -10px;">NEURAL CAPTURE ACTIVE</div>
      <div class="timer-digits" id="timer-display">00:00</div>
      
      <!-- CINEMATIC WAVEFORM (14 BARS) -->
      <div id="wave-viz" class="wave-pro">
         <div class="wave-bar-pro"></div><div class="wave-bar-pro"></div><div class="wave-bar-pro"></div><div class="wave-bar-pro"></div><div class="wave-bar-pro"></div><div class="wave-bar-pro"></div><div class="wave-bar-pro"></div><div class="wave-bar-pro"></div><div class="wave-bar-pro"></div><div class="wave-bar-pro"></div><div class="wave-bar-pro"></div><div class="wave-bar-pro"></div><div class="wave-bar-pro"></div><div class="wave-bar-pro"></div>
      </div>

      <button id="actionBtn" class="btn-action">
         <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg>
         <span id="action-text">START ENGINE</span>
      </button>
    </div>

    <!-- 2. SPEED CONTROLLER -->
    <div class="speed-card">
       <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <span class="compact-label">Neural Velocity</span>
          <span id="speed-indicator" style="font-family:'JetBrains Mono'; font-size:14px; font-weight:800; color:#fff;">1.0x</span>
       </div>
       <input type="range" id="speed-slider" min="1" max="16" step="0.1" value="1">
    </div>

    <!-- 3. LIVE TRANSCRIPTION -->
    <div id="telemetry-panels">
        <span class="compact-label">Intelligence Stream</span>
        <div id="popup-verbatim">Initializing secure bridge...</div>
    </div>

    <div style="display:flex; justify-content:space-between; opacity:0.2; margin-top:5px; padding: 0 4px;">
       <span style="font-size:8px; font-weight:950; cursor:pointer;" id="web-account-link">CLOUD DASHBOARD</span>
       <span style="font-size:8px; font-weight:950; cursor:pointer;" id="btn-emergency-reset">TERMINATE</span>
    </div>

  </div>

  <script src="navigation.js"></script>
  <script type="module" src="popup.js"></script>
  <script type="module">
    import { ModeSelectorUI } from '../lib/mode_selector_ui.js';
    import { MODE_CONFIG } from '../lib/synthesis_engine.js';

    async function initModeSelector() {
        const stored = await chrome.storage.local.get(['selectedMode', 'xp', 'streak_days', 'userProfile']);
        const userTier = stored.userProfile?.tier || 'free';
        const selector = new ModeSelectorUI(
            document.getElementById('mode-selector-root'),
            {
                userTier,
                selectedMode: stored.selectedMode || 'auto',
                xp: stored.xp || 0,
                streakDays: stored.streak_days || 0,
                onModeSelect: async (mode) => {
                    await chrome.storage.local.set({ selectedMode: mode });
                    const cfg = MODE_CONFIG[mode];
                    document.getElementById('active-mode-emoji').textContent = cfg?.emoji || '✨';
                    document.getElementById('active-mode-label').textContent = cfg?.label || 'Auto Mode';
                    document.getElementById('mode-sheet').style.display = 'none';
                },
                onUpgrade: () => {
                    chrome.tabs.create({ url: 'https://prynscribe.app/upgrade' });
                }
            }
        );

        // Set initial display
        const savedMode = stored.selectedMode || 'auto';
        const cfg = MODE_CONFIG[savedMode];
        if (cfg) {
            document.getElementById('active-mode-emoji').textContent = cfg.emoji;
            document.getElementById('active-mode-label').textContent = cfg.label;
        }

        // Listen for XP updates from background
        chrome.runtime.onMessage.addListener((msg) => {
            if (msg.type === 'xp_update') {
                selector.updateXP(msg.total, stored.streak_days || 0);
            }
        });
    }

    initModeSelector();
  </script>
</body>
</html>
